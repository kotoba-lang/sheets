<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kotoba-lang/sheets</title>
  <style>
    :root{--ink:#17202a;--muted:#526170;--line:#d8dee8;--panel:#fff;--wash:#f7f8fb;--accent:#496b9a;--green:#657f3d}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,sans-serif;background:var(--wash);color:var(--ink)}
    main{max-width:1080px;margin:0 auto;padding:38px 20px 52px}h1{margin:0 0 10px;font-size:36px;line-height:1.1;letter-spacing:0}
    p{max-width:820px;color:var(--muted);line-height:1.6}.bar{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 22px}
    button,a.button{min-height:40px;border:1px solid var(--accent);border-radius:6px;background:var(--accent);color:#fff;padding:0 14px;font-weight:700;text-decoration:none;cursor:pointer}
    a.secondary,button.secondary{background:transparent;color:var(--accent)}.work{display:grid;grid-template-columns:minmax(280px,1fr) minmax(280px,1fr);gap:16px}
    textarea{width:100%;min-height:390px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:14px;font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;background:#fff;color:#101725}
    .preview{min-height:390px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:16px;overflow:auto;white-space:pre-wrap;font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace}.label{font-size:12px;color:var(--muted);margin:0 0 8px}
    code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--green)}@media(max-width:820px){.work{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <h1>kotoba-lang/sheets</h1>
  <p>Local kotoba-lang editor for workbooks, tabs, cells, ranges, and formula placeholders. This page runs at <code>kotoba-lang.github.io/sheets/</code> and does not redirect to an external host.</p>
  <div class="bar">
    <button id="create">Create Sheets</button>
    <button id="render">Preview EDN</button>
    <button id="download">Download EDN</button>
    <a class="button secondary" href="https://github.com/kotoba-lang/sheets">GitHub</a>
  </div>
  <div class="work">
    <section><div class="label">Editable EDN</div><textarea id="edn"></textarea></section>
    <section><div class="label">Preview</div><div id="preview" class="preview"></div></section>
  </div>
</main>
<script>
const key='kotoba-lang/sheets/edn';
const sample="{:sheets/id \"book-1\"\n :sheets/tabs [{:id \"plan\"\n                :cells {\"A1\" \"Metric\" \"B1\" \"Value\" \"A2\" \"Revenue\" \"B2\" 120}}]}";
const edn=document.getElementById('edn'), preview=document.getElementById('preview');
edn.value=localStorage.getItem(key)||sample;
function save(){localStorage.setItem(key,edn.value)}
function render(){save();preview.textContent=edn.value;return edn.value}
document.getElementById('render').onclick=render;
document.getElementById('create').onclick=()=>{edn.value=sample;render()};
document.getElementById('download').onclick=()=>{const blob=new Blob([render()],{type:'application/edn'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sheets.edn';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};
edn.addEventListener('input',save);render();
</script>
</body>
</html>
